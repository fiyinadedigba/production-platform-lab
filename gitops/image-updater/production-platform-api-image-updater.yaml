apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: production-platform-api-image-updater
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: "production-platform-api"
      images:
        - alias: "api"
          imageName: "ghcr.io/fiyinadedigba/production-platform-api"
          commonUpdateSettings:
            updateStrategy: "semver"
            allowTags: "regexp:^v[0-9]+\\.[0-9]+\\.[0-9]+$"
            pullSecret: "secret:argocd/ghcr-creds#creds"
          manifestTargets:
            helm:
              name: "image.repository"
              tag: "image.tag"
  writeBackConfig:
    method: "git"
    gitConfig:
      repository: "https://github.com/fiyinadedigba/production-platform-lab.git"
      branch: "main"
