apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: production-platform-api
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/fiyinadedigba/production-platform-lab.git
    targetRevision: main
    path: infrastructure/kubernetes/helm/production-platform-api

    helm:
      values: |
        image:
          repository: ghcr.io/fiyinadedigba/production-platform-api
          tag: v1.0.3

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
