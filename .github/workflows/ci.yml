permissions:
  contents: read
  packages: write
name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: incidents
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
       
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/incidents
      JWT_SECRET: test-secret
    
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
     
      - name: Run Prisma migrations
        run: npx prisma migrate deploy

      - name: Start app and wait for readiness
        run: |
          npm start &
          for i in {1..10}; do
            if curl -s http://localhost:3000/health > /dev/null; then
             echo "App is ready"
             exit 0
            fi
            echo "Waiting for app..."
            sleep 2
           done
           echo "App failed to become ready"
           exit 1

      - name: Run tests
        run: npm test
      - name: Set image tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/production-platform-api:latest \
            -t ghcr.io/${{ github.repository_owner }}/production-platform-api:${{ steps.vars.outputs.TAG }} .
       

      - name: Run Docker container
        run: |
          docker run -d -p 3001:3000 --name test-container ghcr.io/${{ github.repository_owner }}/production-platform-api:latest
        
      - name: Wait for container readiness
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:3001/health > /dev/null; then
              echo "Container is ready"
              exit 0
            fi
            echo "Waiting for container..."
            sleep 2
          done
          echo "Container failed to start"
          docker logs test-container
          exit 1

      - name: Test container endpoint
        run: curl http://localhost:3001/health
     
      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/production-platform-api:latest
          docker push ghcr.io/${{ github.repository_owner }}/production-platform-api:${{ steps.vars.outputs.TAG }}
