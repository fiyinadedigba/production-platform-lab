name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
     
      - name: Start app and wait for readiness
        run: |
          npm start &
          for i in {1..10}; do
            if curl -s http://localhost:3000/health > /dev/null; then
             echo "App is ready"
             exit 0
            fi
            echo "Waiting for app..."
            sleep 2
           done
           echo "App failed to become ready"
           exit 1

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build -t production-platform-api .
