name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
     
      - name: Start app and wait for readiness
        run: |
          npm start &
          for i in {1..10}; do
            if curl -s http://localhost:3000/health > /dev/null; then
             echo "App is ready"
             exit 0
            fi
            echo "Waiting for app..."
            sleep 2
           done
           echo "App failed to become ready"
           exit 1

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build -t production-platform-api .

      - name: Run Docker container
        run: |
          docker run -d -p 3001:3000 --name test-container production-platform-api

      - name: Wait for container readiness
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:3001/health > /dev/null; then
              echo "Container is ready"
              exit 0
            fi
            echo "Waiting for container..."
            sleep 2
          done
          echo "Container failed to start"
          docker logs test-container
          exit 1

      - name: Test container endpoint
        run: curl http://localhost:3001/health
