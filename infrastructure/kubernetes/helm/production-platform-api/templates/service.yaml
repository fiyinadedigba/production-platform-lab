apiVersion: v1
kind: Service
metadata:
  name: production-platform-api
  labels:
    app: production-platform-api
    release: monitoring
spec:
  type: {{ .Values.service.type }}
  selector:
    app: production-platform-api
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
